version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: plannerpulse-db
    environment:
      POSTGRES_DB: plannerpulse
      POSTGRES_USER: plannerpulse
      POSTGRES_PASSWORD: plannerpulse_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plannerpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plannerpulse-network

  # PlannerPulse web application
  web:
    build: .
    container_name: plannerpulse-web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://plannerpulse:plannerpulse_dev_password@db:5432/plannerpulse
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      # Add your OpenAI API key here or via .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MAX_OPENAI_CALLS_PER_RUN=100
      - STATS_CACHE_DURATION=60
    volumes:
      # Mount code for development (remove in production)
      - .:/app
      # Persist generated newsletters
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - plannerpulse-network
    restart: unless-stopped

  # Adminer for database management (optional, remove in production)
  adminer:
    image: adminer:latest
    container_name: plannerpulse-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db
    networks:
      - plannerpulse-network
    profiles:
      - dev

networks:
  plannerpulse-network:
    driver: bridge

volumes:
  postgres_data:
